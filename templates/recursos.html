<nav>

    <a href="/informacion">Informacion</a>

</nav>

<div class="container">

    <h1>Recursos Educativos</h1>

    <div class="card">
        <ul>
    {% for enlace in enlaces %}
    <li>
        <a href="{{ enlace.url }}">{{ enlace.nombre }}</a>
    </li>
    {% endfor %}
</ul>
    </div>

</div>

</body>
</html>
