<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Información</title>

    <style>
        body{font-family: Arial; margin:0; background:#f4f6f9;}
        nav{background:#1f4e79; padding:15px;}
        nav a{color:white; margin-right:15px; text-decoration:none; font-weight:bold;}
        .container{padding:20px;}
        .card{background:white; padding:20px; border-radius:10px; margin-top:20px;}
        h1{color:#1f4e79;}
        ul{line-height:1.8;}
    </style>
</head>
<body>

<nav>
    <a href="/">Inicio</a>
    <a href="/informacion">Informacion</a>
    <a href="/recursos">Recursos</a>
    <a href="/tareas">Tareas</a>
</nav>

<div class="container">

    <h1>Información de la Clase</h1>

    <div class="card">
        <p><strong>Aula:</strong> {{ aula }}</p>
        <p><strong>Profesor:</strong> {{ profesor }}</p>
        <p><strong>Horario:</strong> {{ horario }}</p>
    </div>

    <div class="card">
      <h2>Objetivos de la clase</h2>
<ul>
    {% for objetivo in objetivos %}
    <li>{{ objetivo }}</li>
    {% endfor %}
</ul>
    </div>

</div>

</body>
</html>
